<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Win a Pikachu! - Home</title>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- Hero / main content comes here -->

<main class="hero">
  <h1>Win A Pikachu!</h1>

  <div class="mobile-wheel">

 <div class="wheel-wrapper">

<div class="pointer"></div>

<div class="wheel" id="wheel">

 <div class="segment"><img src="pika2.png" alt="Pikachu 1"></div>
<div class="segment"><img src="pika2.png" alt="Pikachu 2"></div>
<div class="segment"><img src="pika2.png" alt="Pikachu 3"></div>
<div class="segment"><img src="pika2.png" alt="Pikachu 4"></div>
<div class="segment"><img src="pika2.png" alt="Pikachu 5"></div>
<div class="segment"><img src="pika2.png" alt="Pikachu 6"></div>

</div>

<div class="hub" onclick="spinWheel()">SPIN</div>

</div>  
</div> 

<script>

const wheel = document.getElementById("wheel");

let rotation = 0;
let velocity = 0;
let isDragging = false;
let lastAngle = 0;

function getAngle(x,y){

const rect = wheel.getBoundingClientRect();
const cx = rect.left + rect.width/2;
const cy = rect.top + rect.height/2;

return Math.atan2(y-cy,x-cx) * 180/Math.PI;

}

wheel.addEventListener("touchstart",(e)=>{

isDragging = true;
velocity = 0;

const touch = e.touches[0];
lastAngle = getAngle(touch.clientX,touch.clientY);

});

wheel.addEventListener("touchmove",(e)=>{

if(!isDragging) return;

const touch = e.touches[0];
const angle = getAngle(touch.clientX,touch.clientY);

let delta = angle - lastAngle;

rotation += delta;
velocity = delta;

wheel.style.transform = `rotate(${rotation}deg)`;

lastAngle = angle;

});

wheel.addEventListener("touchend",()=>{

isDragging = false;
spinMomentum();

});

function spinMomentum(){

rotation += velocity;

velocity *= 0.95;   // friction

wheel.style.transform = `rotate(${rotation}deg)`;

if(Math.abs(velocity) > 0.1){

requestAnimationFrame(spinMomentum);

}else{

// 🎉 WHEEL HAS STOPPED → GO TO WIN PAGE
setTimeout(() => {
window.location.href = "pikachu.html";
}, 500);

}

}

function spinWheel(){

velocity = Math.random()*20 + 25;

spinMomentum();

}

</script>
  
<p class="hero-subtext">
Did you win a pikachu?
</p>
    
</main>

<footer>
  © 2026 Pikachu's for the win!
</footer>
  </body>
</html>
