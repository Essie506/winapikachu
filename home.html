 <div class="wheel-wrapper">

<div class="wheel" id="wheel">

 <div class="segment"><i class="fa-solid fa-bicycle"></i></div>
 <div class="segment"><i class="fa-solid fa-person-running"></i></div>
 <div class="segment"><i class="fa-solid fa-person-walking"></i></div>
 <div class="segment"><i class="fa-solid fa-spa"></i></div>
 <div class="segment"><i class="fa-solid fa-bolt"></i></div>
 <div class="segment"><i class="fa-solid fa-heart-pulse"></i></div>

</div>

<div class="hub" onclick="spinWheel()">SPIN</div>

<script>

const wheel = document.getElementById("wheel");

let rotation = 0;
let velocity = 0;
let isDragging = false;
let lastAngle = 0;

function getAngle(x,y){

const rect = wheel.getBoundingClientRect();
const cx = rect.left + rect.width/2;
const cy = rect.top + rect.height/2;

return Math.atan2(y-cy,x-cx) * 180/Math.PI;

}

wheel.addEventListener("touchstart",(e)=>{

isDragging = true;
velocity = 0;

const touch = e.touches[0];
lastAngle = getAngle(touch.clientX,touch.clientY);

});

wheel.addEventListener("touchmove",(e)=>{

if(!isDragging) return;

const touch = e.touches[0];
const angle = getAngle(touch.clientX,touch.clientY);

let delta = angle - lastAngle;

rotation += delta;
velocity = delta;

wheel.style.transform = `rotate(${rotation}deg)`;

lastAngle = angle;

});

wheel.addEventListener("touchend",()=>{

isDragging = false;
spinMomentum();

});

function spinMomentum(){

rotation += velocity;

velocity *= 0.95;   // friction

wheel.style.transform = `rotate(${rotation}deg)`;

if(Math.abs(velocity) > 0.1){

requestAnimationFrame(spinMomentum);

}

}

function spinWheel(){

velocity = Math.random()*20 + 25;

spinMomentum();

}

</script>
